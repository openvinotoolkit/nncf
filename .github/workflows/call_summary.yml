name: Reusable Test Summary
permissions: read-all

on:
  workflow_call:
    inputs:
      artifact_pattern:
        description: 'Pattern to match test artifacts'
        required: true
        type: string

jobs:
  generate-summary:
    name: Summary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/scripts/pytest_md_summary.py
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ${{ inputs.artifact_pattern }}
          path: test-results
      - name: Test Summary
        run: |
          pip install defusedxml==0.7.1
          python .github/scripts/pytest_md_summary.py test-results >> "$GITHUB_STEP_SUMMARY"
